trigger:
  branches:
    include:
    - dev/*
  paths:
    exclude:
    - k8s/**
name: 1.0.$(Rev:r)
variables:
- name: solution
  value: '**/*.sln'
- name: buildPlatform
  value: 'x64'
- name: buildConfiguration
  value: 'Release'
stages:
- stage: Build
  displayName: Build
  jobs:
  - job: Build
    displayName: Build
    pool: Default
    steps:
    - task: Docker@2
      displayName: Build Docker image
      inputs:
        command: 'build'
        repository: 'summershalloween/summershalloween'
        Dockerfile: '$(system.defaultworkingdirectory)/SummersManorHalloweenPuzzle/Dockerfile.webapp'
        tags: |
          $(Build.BuildNumber)

- stage: DEV
  displayName: Deploy To Dev
  jobs:
  - job: DeployToDev
    displayName: Deploy To Dev
    pool: Default
    steps:
    - checkout: self
      persistCredentials: true
      clean: true
    - task: Docker@2
      displayName: Tag image for Nexus
      inputs:
        command: 'tag'
        arguments: 'summershalloween/summershalloween:$(Build.BuildNumber) nexus.summershome.duckdns.org/summershalloween/summershalloween:dev.$(Build.BuildNumber)'
    - task: Docker@2
      displayName: Login to Nexus
      inputs:
        command: 'login'
        containerRegistry: 'Nexus Docker'
    - task: Docker@2
      displayName: Push image to Nexus
      inputs:
        command: 'push'
        containerRegistry: 'Nexus Docker'
        repository: 'summershalloween/summershalloween'
        tags: |
          dev.$(Build.BuildNumber)
    - task: Bash@3
      displayName: Update kustomize image tag (dev)
      inputs:
        targetType: 'inline'
        workingDirectory: '$(Build.SourcesDirectory)/k8s/overlays/dev'
        script: |
          set -e
          kustomize edit set image \
            nexus.summershome.duckdns.org/summershalloween/summershalloween:dev.$(Build.BuildNumber)
    - task: Bash@3
      displayName: Deploy to dev cluster
      inputs:
        targetType: 'inline'
        workingDirectory: '$(Build.SourcesDirectory)'
        script: |
          set -e
          kubectl apply -k k8s/overlays/dev
          kubectl rollout status deployment/webapp -n halloween-web-app-dev --timeout=180s
    - task: Bash@3
      displayName: Commit updated image tag
      env:
        GIT_PAT: $(GIT_PAT)
      inputs:
        targetType: 'inline'
        workingDirectory: '$(Build.SourcesDirectory)'
        script: |
          set -e
          git config user.email "pipeline@devops"
          git config user.name "Azure Pipeline"
          BRANCH=$(echo "$(Build.SourceBranch)" | sed 's|refs/heads/||')
          REMOTE_URL="https://pat:$GIT_PAT@dev.azure.com/charlessummers/General/_git/SummersManorHalloweenPuzzle"
          rm -rf .git/rebase-merge .git/rebase-apply
          git fetch "$REMOTE_URL" "$BRANCH"
          git checkout -B "$BRANCH" FETCH_HEAD
          git add k8s/overlays/dev/kustomization.yaml
          git diff --staged --quiet && echo "No changes to commit." && exit 0
          git commit -m "Update dev image tag to $(Build.BuildNumber) ***NO_CI***"
          git push "$REMOTE_URL" HEAD:"$BRANCH"
