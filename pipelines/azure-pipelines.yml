trigger:
  branches:
    include:
    - master
  paths:
    exclude:
    - k8s/**
name: 1.0.$(Rev:r)
variables:
- name: solution
  value: '**/*.sln'
- name: buildPlatform
  value: 'x64'
- name: buildConfiguration
  value: 'Release'
stages:
- stage: Build
  displayName: Build
  jobs:
  - job: Build
    displayName: Build
    pool: Default
    steps:
    - task: Bash@3
      displayName: Prune all Docker images
      inputs:
        targetType: 'inline'
        script: 'docker image prune -a -f'
    - task: Docker@2
      displayName: Build Docker image
      inputs:
        command: 'build'
        repository: 'summershalloween/summershalloween'
        Dockerfile: '$(system.defaultworkingdirectory)/SummersManorHalloweenPuzzle/Dockerfile.webapp'
        arguments: '--no-cache'
        tags: |
          $(Build.BuildNumber)

- stage: TEST
  displayName: Deploy To Test
  jobs:
  - job: DeployToTest
    displayName: Deploy To Test
    pool: Default
    steps:
    - checkout: self
      persistCredentials: true
    - task: Docker@2
      displayName: Tag image for Nexus
      inputs:
        command: 'tag'
        arguments: 'summershalloween/summershalloween:$(Build.BuildNumber) nexus.summershome.duckdns.org/summershalloween/summershalloween:test.$(Build.BuildNumber)'
    - task: Docker@2
      displayName: Login to Nexus
      inputs:
        command: 'login'
        containerRegistry: 'Nexus Docker'
    - task: Docker@2
      displayName: Push image to Nexus
      inputs:
        command: 'push'
        containerRegistry: 'Nexus Docker'
        repository: 'summershalloween/summershalloween'
        tags: |
          test.$(Build.BuildNumber)
    - task: Bash@3
      displayName: Update kustomize image tag (test)
      inputs:
        targetType: 'inline'
        workingDirectory: '$(Build.SourcesDirectory)/k8s/overlays/test'
        script: |
          kustomize edit set image \
            nexus.summershome.duckdns.org/summershalloween/summershalloween:test.$(Build.BuildNumber)
    - task: Bash@3
      displayName: Deploy to test cluster
      inputs:
        targetType: 'inline'
        workingDirectory: '$(Build.SourcesDirectory)'
        script: |
          kubectl apply -k k8s/overlays/test
    - task: Bash@3
      displayName: Commit updated image tag
      env:
        GIT_PAT: $(GIT_PAT)
      inputs:
        targetType: 'inline'
        workingDirectory: '$(Build.SourcesDirectory)'
        script: |
          git config user.email "pipeline@devops"
          git config user.name "Azure Pipeline"
          git add k8s/overlays/test/kustomization.yaml
          git diff --staged --quiet && echo "No changes to commit." && exit 0
          git commit -m "Update test image tag to $(Build.BuildNumber) ***NO_CI***"
          git fetch https://pat:$GIT_PAT@dev.azure.com/charlessummers/General/_git/SummersManorHalloweenPuzzle master
          git rebase FETCH_HEAD
          git push https://pat:$GIT_PAT@dev.azure.com/charlessummers/General/_git/SummersManorHalloweenPuzzle HEAD:master

- stage: PROD
  trigger: manual
  displayName: Deploy To Prod
  jobs:
  - job: DeployToProd
    displayName: Deploy To Prod
    pool: Default
    steps:
    - checkout: self
      persistCredentials: true
    - task: Docker@2
      displayName: Tag image for Nexus
      inputs:
        command: 'tag'
        arguments: 'summershalloween/summershalloween:$(Build.BuildNumber) nexus.summershome.duckdns.org/summershalloween/summershalloween:prod.$(Build.BuildNumber)'
    - task: Docker@2
      displayName: Login to Nexus
      inputs:
        command: 'login'
        containerRegistry: 'Nexus Docker'
    - task: Docker@2
      displayName: Push image to Nexus
      inputs:
        command: 'push'
        containerRegistry: 'Nexus Docker'
        repository: 'summershalloween/summershalloween'
        tags: |
          prod.$(Build.BuildNumber)
    - task: Bash@3
      displayName: Update kustomize image tag (prod)
      inputs:
        targetType: 'inline'
        workingDirectory: '$(Build.SourcesDirectory)/k8s/overlays/prod'
        script: |
          kustomize edit set image \
            nexus.summershome.duckdns.org/summershalloween/summershalloween:prod.$(Build.BuildNumber)
    - task: Bash@3
      displayName: Deploy to prod cluster
      inputs:
        targetType: 'inline'
        workingDirectory: '$(Build.SourcesDirectory)'
        script: |
          kubectl apply -k k8s/overlays/prod
    - task: Bash@3
      displayName: Commit updated image tag
      env:
        GIT_PAT: $(GIT_PAT)
      inputs:
        targetType: 'inline'
        workingDirectory: '$(Build.SourcesDirectory)'
        script: |
          git config user.email "pipeline@devops"
          git config user.name "Azure Pipeline"
          git add k8s/overlays/prod/kustomization.yaml
          git diff --staged --quiet && echo "No changes to commit." && exit 0
          git commit -m "Update prod image tag to $(Build.BuildNumber) ***NO_CI***"
          git fetch https://pat:$GIT_PAT@dev.azure.com/charlessummers/General/_git/SummersManorHalloweenPuzzle master
          git rebase FETCH_HEAD
          git push https://pat:$GIT_PAT@dev.azure.com/charlessummers/General/_git/SummersManorHalloweenPuzzle HEAD:master