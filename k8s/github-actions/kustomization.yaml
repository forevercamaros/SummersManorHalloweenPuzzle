apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: github-actions

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - clusterrole.yaml
  - clusterrolebinding.yaml
  - secret.yaml
  - deployment.yaml
  - hpa.yaml

commonLabels:
  app: github-actions-runner
  managed-by: kustomize
