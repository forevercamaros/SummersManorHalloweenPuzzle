apiVersion: v1
kind: Secret
metadata:
  name: github-actions-runner-secret
  namespace: github-actions
  labels:
    app: github-actions-runner
type: Opaque
stringData:
  # Replace with your GitHub Personal Access Token (PAT)
  # Required scopes: repo, admin:org_hook, workflow
  GITHUB_TOKEN: ""
  
  # Repository owner (e.g., charlessummers)
  GITHUB_OWNER: ""
  
  # Repository name (e.g., General)
  GITHUB_REPO: ""
  
  # Docker credentials for Nexus registry
  DOCKER_USERNAME: ""
  DOCKER_PASSWORD: ""
  DOCKER_REGISTRY: "nexus.summershome.duckdns.org"
