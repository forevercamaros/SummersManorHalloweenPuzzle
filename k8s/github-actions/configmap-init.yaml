apiVersion: v1
kind: ConfigMap
metadata:
  name: github-runner-init
  namespace: github-actions
data:
  init.sh: |
    #!/bin/bash
    set -e

    echo "Starting GitHub Actions runner initialization..."

    # Install dependencies as root (including runner runtime libs)
    apt-get update -qq
    apt-get install -y curl git unzip jq ca-certificates sudo \
      lsb-release libicu74 libssl3 libkrb5-3 zlib1g libgcc-s1 2>&1 | tail -5

    echo "Dependencies installed."

    # Create a non-root runner user (runner binary refuses to run as root)
    useradd -m -s /bin/bash runner 2>/dev/null || true
    chown -R runner:runner /home/runner

    # Run runner.sh as the runner user, preserving container env vars (-p flag)
    exec su -p -s /bin/bash runner /scripts/runner.sh

  runner.sh: |
    #!/bin/bash
    set -e

    echo "Running as user: $(id)"
    echo "Current dir: $(pwd)"

    # Ensure runner user owns its home dir
    mkdir -p /home/runner/_work
    cd /home/runner
    echo "Changed to: $(pwd)"

    echo "Fetching runner registration token..."
    REG_TOKEN=$(curl -s -X POST \
      -H "Authorization: token ${GITHUB_TOKEN}" \
      -H "Accept: application/vnd.github+json" \
      "https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/actions/runners/registration-token" \
      | jq -r '.token')

    if [ -z "$REG_TOKEN" ] || [ "$REG_TOKEN" = "null" ]; then
      echo "ERROR: Failed to get registration token. Check GITHUB_TOKEN permissions."
      exit 1
    fi

    echo "Registration token obtained."

    RUNNER_VERSION=$(curl -s https://api.github.com/repos/actions/runner/releases/latest | jq -r '.tag_name' | sed 's/v//')
    echo "Installing GitHub Actions runner v${RUNNER_VERSION}"
    echo "Downloading to: $(pwd)/runner.tar.gz  (writable: $(test -w . && echo yes || echo NO))"

    curl -fL "https://github.com/actions/runner/releases/download/v${RUNNER_VERSION}/actions-runner-linux-x64-${RUNNER_VERSION}.tar.gz" \
      -o runner.tar.gz
    echo "Download complete. Extracting..."
    tar xzf runner.tar.gz
    rm runner.tar.gz

    echo "Configuring runner..."
    ./config.sh \
      --unattended \
      --url "https://github.com/${GITHUB_OWNER}/${GITHUB_REPO}" \
      --token "${REG_TOKEN}" \
      --name "${RUNNER_NAME}" \
      --labels "self-hosted,linux,docker,kubernetes" \
      --work "_work"

    echo "Runner configured. Starting..."
    exec ./run.sh

