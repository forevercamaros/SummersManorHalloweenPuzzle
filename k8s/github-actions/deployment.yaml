apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-actions-runner
  namespace: github-actions
  labels:
    app: github-actions-runner
spec:
  replicas: 1 # Will be overridden by HPA
  selector:
    matchLabels:
      app: github-actions-runner
  template:
    metadata:
      labels:
        app: github-actions-runner
    spec:
      serviceAccountName: github-actions-runner

      initContainers: []

      containers:
        - name: runner
          image: ubuntu:24.04
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "/scripts/init.sh"]

          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-actions-runner-secret
                  key: GITHUB_TOKEN

            - name: GITHUB_OWNER
              valueFrom:
                secretKeyRef:
                  name: github-actions-runner-secret
                  key: GITHUB_OWNER

            - name: GITHUB_REPO
              valueFrom:
                secretKeyRef:
                  name: github-actions-runner-secret
                  key: GITHUB_REPO

            - name: RUNNER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name

            - name: RUNNER_ALLOW_RUNASROOT
              value: "1"

          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi

          volumeMounts:
            - name: init-script
              mountPath: /scripts
            - name: work
              mountPath: /home/runner/_work
            - name: containerd-sock
              mountPath: /run/containerd

          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - ps aux | grep -q "[r]unner"
            initialDelaySeconds: 120
            periodSeconds: 60
            timeoutSeconds: 10

      volumes:
        - name: init-script
          configMap:
            name: github-runner-init
            defaultMode: 0755

        - name: work
          emptyDir:
            sizeLimit: 10Gi

        - name: containerd-sock
          hostPath:
            path: /run/containerd
            type: Directory

      restartPolicy: Always

      tolerations: []
      nodeSelector: {}
