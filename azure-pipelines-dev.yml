trigger:
  branches:
    include:
    - dev/*
name: 1.0.$(Rev:r)
variables:
- name: solution
  value: '**/*.sln'
- name: buildPlatform
  value: 'x64'
- name: buildConfiguration
  value: 'Release'
stages:
- stage: Build
  displayName: Build
  jobs:
  - job: Build
    displayName: Build
    pool: Default
    steps:
    - task: Docker@2
      displayName: Build Docker image
      inputs:
        command: 'build'
        repository: 'summershalloween/summershalloween'
        Dockerfile: '$(system.defaultworkingdirectory)/SummersManorHalloweenPuzzle/Dockerfile.webapp'
        tags: |
          $(Build.BuildNumber)
          
- stage: DEV
  displayName: Deploy To Dev
  jobs:
  - job: DeployToDev
    displayName: Deploy To Dev
    pool: Default
    steps:
    - task: Docker@2
      displayName: Tag image for Nexus
      inputs:
        command: 'tag'
        arguments: 'summershalloween/summershalloween:$(Build.BuildNumber) nexus.summershome.duckdns.org/summershalloween/summershalloween:dev.$(Build.BuildNumber)'
    - task: Docker@2
      displayName: Login to Nexus
      inputs:
        command: 'login'
        containerRegistry: 'Nexus Docker'
    - task: Docker@2
      displayName: Push image to Nexus
      inputs:
        command: 'push'
        containerRegistry: 'Nexus Docker'
        repository: 'summershalloween/summershalloween'
        tags: |
          dev.$(Build.BuildNumber)