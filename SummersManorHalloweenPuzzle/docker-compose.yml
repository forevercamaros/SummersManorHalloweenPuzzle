version: '3'
services:
  MySql:
    image: 'forevercamaros/summershalloweenmysql:latest'
    build:
      context: .
      dockerfile: Dockerfile.mysql
    environment:
     - MYSQL_ROOT_PASSWORD=Rpibbb013.
     - MYSQL_DATABASE=SummersManor
     - MYSQL_USER=WebAppUser
     - MYSQL_PASSWORD=Rpibbb013.
    ports:
     - "3306:3306"
     - "33060:33060"
  WebApp:
    image: forevercamaros/summershalloween:latest
    build:
      context: .
      dockerfile: Dockerfile.webapp
    environment:
     - CONNECTIONSTRING=Server=mysql;Database=SummersManor;User Id=WebAppUser;Password=Rpibbb013.;
    ports:
     - "80:80"
     - "443:443"
