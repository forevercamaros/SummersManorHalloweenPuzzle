trigger:
  branches:
    include:
    - master
name: 1.0.$(Rev:r)
variables:
- name: solution
  value: '**/*.sln'
- name: buildPlatform
  value: 'x64'
- name: buildConfiguration
  value: 'Release'
stages:
- stage: Build
  displayName: Build
  jobs:
  - job: Build
    displayName: Build
    pool: Default
    steps:
    - task: Bash@3
      displayName: Prune all Docker images
      inputs:
        targetType: 'inline'
        script: 'docker image prune -a -f'
    - task: Docker@2
      displayName: Build Docker image
      inputs:
        command: 'build'
        repository: 'HalloweenApp/summershalloween'
        Dockerfile: '$(system.defaultworkingdirectory)/SummersManorHalloweenPuzzle/Dockerfile.webapp'
        arguments: '--no-cache'
        tags: |
          $(Build.BuildNumber)
          
- stage: TEST
  displayName: Deploy To Test
  jobs:
  - job: DeployToTest
    displayName: Deploy To Test
    pool: Default
    steps:
    - task: Docker@2
      displayName: Tag image for Nexus
      inputs:
        command: 'tag'
        arguments: 'HalloweenApp/summershalloween:$(Build.BuildNumber) nexus.summershome.duckdns.org/HalloweenApp/summershalloween:test.$(Build.BuildNumber)'
    - task: Docker@2
      displayName: Login to Nexus
      inputs:
        command: 'login'
        containerRegistry: 'Nexus Docker'
    - task: Docker@2
      displayName: Push image to Nexus
      inputs:
        command: 'push'
        containerRegistry: 'Nexus Docker'
        repository: 'HalloweenApp/summershalloween'
        tags: |
          test.$(Build.BuildNumber)
- stage: PROD
  trigger: manual
  displayName: Deploy To Prod
  jobs:
  - job: DeployToProd
    displayName: Deploy To Prod
    pool: Default
    steps:
    - task: Docker@2
      displayName: Tag image for Nexus
      inputs:
        command: 'tag'
        arguments: 'HalloweenApp/summershalloween:$(Build.BuildNumber) nexus.summershome.duckdns.org/HalloweenApp/summershalloween:prod.$(Build.BuildNumber)'
    - task: Docker@2
      displayName: Login to Nexus
      inputs:
        command: 'login'
        containerRegistry: 'Nexus Docker'
    - task: Docker@2
      displayName: Push image to Nexus
      inputs:
        command: 'push'
        containerRegistry: 'Nexus Docker'
        repository: 'HalloweenApp/summershalloween'
        tags: |
          prod.$(Build.BuildNumber)