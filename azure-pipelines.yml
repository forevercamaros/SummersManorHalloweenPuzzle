trigger:
  branches:
    include:
    - master
name: 1.0.$(Rev:r)
variables:
- name: solution
  value: '**/*.sln'
- name: buildPlatform
  value: 'x64'
- name: buildConfiguration
  value: 'Release'
stages:
- stage: __default
  jobs:
  - job: Job
    pool: Default
    steps:
    - task: Docker@2
      displayName: Build Docker image
      inputs:
        command: 'build'
        repository: 'summershalloween/summershalloween'
        Dockerfile: '$(system.defaultworkingdirectory)/SummersManorHalloweenPuzzle/Dockerfile.webapp'
        tags: |
          $(Build.BuildNumber)
          latest
    - task: Docker@2
      displayName: Tag image for Harbor
      inputs:
        command: 'tag'
        arguments: 'summershalloween/summershalloween:$(Build.BuildNumber) harbor.summershome.duckdns.org/summershalloween/summershalloween:$(Build.BuildNumber)'
    - task: Docker@2
      displayName: Tag latest for Harbor
      inputs:
        command: 'tag'
        arguments: 'summershalloween/summershalloween:latest harbor.summershome.duckdns.org/summershalloween/summershalloween:latest'
    - task: Docker@2
      displayName: Login to Harbor
      inputs:
        command: 'login'
        containerRegistry: 'Harbor Container Registry'
    
    # Test Harbor connectivity
    - script: |
        ping -c 4 harbor.summershome.duckdns.org
        nslookup harbor.summershome.duckdns.org
        curl -I https://harbor.summershome.duckdns.org
      displayName: 'Test Harbor connectivity'
    
    # Configure Docker for better timeout handling
    - script: |
        echo '{"max-concurrent-uploads": 1, "max-concurrent-downloads": 1, "registry-mirrors": []}' | sudo tee /etc/docker/daemon.json
        sudo systemctl reload docker
        sleep 5
      displayName: 'Configure Docker daemon'
    
    # Push using script with custom retry logic
    - script: |
        #!/bin/bash
        set -e
        
        # Function to push with retry logic
        push_with_retry() {
            local image=$1
            local max_attempts=1
            local attempt=1
            local wait_time=30
            
            while [ $attempt -le $max_attempts ]; do
                echo "Attempt $attempt of $max_attempts for $image"
                echo "docker push \"$image\""
                if docker push "$image"; then
                    echo "Successfully pushed $image"
                    return 0
                else
                    echo "Push attempt $attempt failed for $image"
                    if [ $attempt -lt $max_attempts ]; then
                        echo "Waiting $wait_time seconds before retry..."
                        sleep $wait_time
                        # Exponential backoff
                        wait_time=$((wait_time * 2))
                    fi
                fi
                attempt=$((attempt + 1))
            done
            
            echo "Failed to push $image after $max_attempts attempts"
            return 1
        }
        
        # Push versioned image
        echo "Pushing versioned image..."
        push_with_retry "harbor.summershome.duckdns.org/summershalloween/summershalloween:$(Build.BuildNumber)"
        
        # Push latest image
        echo "Pushing latest image..."
        push_with_retry "harbor.summershome.duckdns.org/summershalloween/summershalloween:latest"
        
        echo "All images pushed successfully!"
        
      displayName: 'Push images to Harbor with retry logic'
      timeoutInMinutes: 60
      
    - task: CopyFiles@2
      inputs:
        SourceFolder: '$(Build.SourcesDirectory)'
        Contents: '**/docker-compose.yml'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'
        publishLocation: 'Container'